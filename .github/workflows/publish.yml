name: Publish core-db1

on:
  push:
    branches:
      - dev
      - staging
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@Harshapatel340'

      - run: npm install

      - name: Set package name and version per branch
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json'));
              pkg.name = '@Harshapatel340/core-db1-latest';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            "
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json'));
              pkg.name = '@Harshapatel340/core-db1-staging';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            "
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json'));
              pkg.name = '@Harshapatel340/core-db1-dev';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            "
          fi

      - name: Publish package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}